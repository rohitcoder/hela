name: ci

on:
  push:
    branches:
      - "master"

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      -
        name: Checkout
        uses: actions/checkout@v3
      -
        name: Set up Google Cloud CLI
        uses: google-github-actions/auth@v1
        with:
          version: 355.0.0 # Update to the latest version if needed
          service_account_key: ${{ secrets.GCR_AUTH_CRDSERV }}
      -
        name: Configure Docker CLI
        run: gcloud auth configure-docker -q
      -
        name: Build and push to Google Container Registry
        run: |
          docker build -t asia.gcr.io/stage-crdserv-applayer-01-7415/hela:0.1 .
          docker push asia.gcr.io/stage-crdserv-applayer-01-7415/hela:0.1
