name: ci

on:
  push:
    branches:
      - "master"

jobs:
  build:
    runs-on: org-level-runner
    steps:
      -
        name: Checkout
        uses: actions/checkout@v3
      - name: Set up Cloud SDK
        uses: google-github-actions/auth@v1
        with:
          credentials_json: ${{ secrets.GCR_AUTH_CRDSERV }}
          export_default_credentials: true
      - name: Run gcloud test
        run: gcloud auth list
