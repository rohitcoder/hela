name: ci

on:
  push:
    branches:
      - "master"

jobs:
  build:
    runs-on: org-level-runner
    steps:
      -
        name: Checkout
        uses: actions/checkout@v3
      - name: Set up Cloud SDK
        uses: google-github-actions/setup-gcloud@v0.3.0
        with:
          project_id: stage-crdserv-applayer-01-7415
          credentials_json: ${{ secrets.GCR_AUTH_CRDSERV }}
      - name: Run gcloud test
        run: gcloud auth configure-docker
