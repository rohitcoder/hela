name: ci

on:
  push:
    branches:
      - "master"

jobs:
  build:
    runs-on: org-level-runner

    steps:
      - name: Checkout
        uses: actions/checkout@v2

      - name: Set up Google Cloud CLI
        uses: google-github-actions/auth@v1
        with:
          credentials_json: ${{ secrets.GCR_AUTH_CRDSERV }}

      - name: Save GCR_AUTH_CRDSERV to a JSON file
        run: echo '${{ secrets.GCR_AUTH_CRDSERV }}' > gcr-auth.json

      - name: Authenticate with Google Cloud
        run: gcloud auth activate-service-account --key-file=gcr-auth.json

      - name: Configure Docker CLI
        run: |
          export GOOGLE_APPLICATION_CREDENTIALS=/github/workspace/gcr-auth.json
          gcloud auth configure-docker -q

      - name: Build and push to Google Container Registry
        run: |
          docker build -t asia.gcr.io/stage-crdserv-applayer-01-7415/hela:0.1 .
          docker push asia.gcr.io/stage-crdserv-applayer-01-7415/hela:0.1
