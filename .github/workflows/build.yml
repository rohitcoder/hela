name: ci

on:
  push:
    branches:
      - "master"

jobs:
  build:
    runs-on: org-level-runner

    steps:
      - name: Checkout
        uses: actions/checkout@v2

      - name: Install Google Cloud SDK
        run: |
          curl -sSL https://sdk.cloud.google.com | bash
          exec -l $SHELL
          echo "source $HOME/google-cloud-sdk/path.bash.inc" >> $HOME/.bashrc
          export CLOUDSDK_CORE_DISABLE_PROMPTS=1
          source $HOME/.bashrc  # Source the updated .bashrc
          
      - name: Set up Google Cloud CLI
        uses: google-github-actions/auth@v1
        with:
          credentials_json: ${{ secrets.GCR_AUTH_CRDSERV }}

      - name: Configure Docker CLI
        run: |
          export GOOGLE_APPLICATION_CREDENTIALS=$HOME/google-cloud-sdk/path.bash.inc
          gcloud auth configure-docker -q

      - name: Build and push to Google Container Registry
        run: |
          docker build -t asia.gcr.io/stage-crdserv-applayer-01-7415/hela:0.1 .
          docker push asia.gcr.io/stage-crdserv-applayer-01-7415/hela:0.1
