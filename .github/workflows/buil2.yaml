name: ci

on:
  push:
    branches:
      - "master"

jobs:
  build:
    runs-on: org-level-runner
    steps:
      - name: Checkout
        uses: actions/checkout@v3
      - name: Login to Docker Hub
        uses: docker/login-action@v2
        with:
          registry: gcr.io
          username: _json_key
          password: ${{ secrets.GCR_AUTH_CRDSERV }}
      - name: Install Docker Buildx
        run: |
          # Install Docker Buildx
          wget https://github.com/docker/buildx/releases/download/v0.6.3/buildx-v0.6.3.linux-amd64 -O /usr/local/bin/docker-buildx
          chmod +x /usr/local/bin/docker-buildx
          # Create a Docker context and use it
          docker context create my-context
          docker buildx use my-context
      - name: Build and push
        uses: docker/build-push-action@v3
        with:
          context: .
          file: ./Dockerfile
          push: true
          tags: asia.gcr.io/stage-crdserv-applayer-01-7415/hela:0.1
