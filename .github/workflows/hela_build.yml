name: Build Rust Project and Print Directories

on:
  push:
    branches:
      - master

jobs:
  build:
    runs-on: org-level-runner

    steps:
      - name: Checkout aalmiray/helloworld-rust
        uses: actions/checkout@v2
        with:
          repository: aalmiray/helloworld-rust

      - name: Set up Rust toolchain
        uses: actions-rs/toolchain@v1
        with:
          profile: minimal
          toolchain: stable

      - name: Build Rust project
        run: |
          cargo build --release
          echo "Contents of release directory:"
          ls -l $GITHUB_WORKSPACE/target/release

      - name: Copy binary to artifacts directory
        run: cp $GITHUB_WORKSPACE/target/release/helloworld $GITHUB_WORKSPACE/helloworld

      - name: Run the binary
        run: $GITHUB_WORKSPACE/helloworld

      - name: Print contents of $GITHUB_WORKSPACE
        run: ls -l $GITHUB_WORKSPACE
        
      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: helloworld
          path: /runner/_work/hela-groww/hela-groww/target/release
          retention-days: 5
