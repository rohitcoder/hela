name: Build Rust Project and Print Directories

on:
  push:
    branches:
      - master

jobs:
  build:
    runs-on: org-level-runner

    steps:
      - name: Checkout aalmiray/helloworld-rust
        uses: actions/checkout@v2
        with:
          repository: aalmiray/helloworld-rust

      - name: Set up Rust toolchain
        uses: actions-rs/toolchain@v1
        with:
          profile: minimal
          toolchain: stable

      - name: Build Rust project
        run: |
          cargo build --release
          # Print list of directories in the current directory
          ls -l | grep '^d'
          # Print the name of the current directory
          echo "Current Directory: $GITHUB_WORKSPACE/$(basename $PWD)"
          # Print the list of contents in the release directory
          echo "Contents of release directory:"
          ls -l $GITHUB_WORKSPACE/release

      - name: Copy binary to artifacts directory
        run: cp $GITHUB_WORKSPACE/release/helloworld-rust $GITHUB_WORKSPACE/helloworld-rust
        working-directory: $GITHUB_WORKSPACE
        # This assumes that the binary is in $GITHUB_WORKSPACE/release directory
        # If it has a different path or name, update the cp command accordingly

      - name: Upload artifact
        uses: actions/upload-artifact@v2
        with:
          name: helloworld-rust-binary
          path: $GITHUB_WORKSPACE/helloworld-rust
