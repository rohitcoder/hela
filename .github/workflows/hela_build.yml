name: Build Rust Project and Print Directories

on:
  push:
    branches:
      - master

jobs:
  build:
    runs-on: org-level-runner

    steps:
      - name: Checkout aalmiray/helloworld-rust
        uses: actions/checkout@v2
        with:
          repository: aalmiray/helloworld-rust

      - name: Set up Rust toolchain
        uses: actions-rs/toolchain@v1
        with:
          profile: minimal
          toolchain: stable

      - name: Build Rust project
        run: |
          cargo build --release
          echo "Contents of release directory:"
          ls -l $GITHUB_WORKSPACE/target/release

      - name: Copy binary to artifacts directory
        run: cp target/release/helloworld helloworld
        working-directory: $GITHUB_WORKSPACE

      - name: Upload artifact
        uses: actions/upload-artifact@v2
        with:
          name: helloworld-rust-binary
          path: $GITHUB_WORKSPACE/helloworld
